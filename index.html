<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동아리 홍보 페이지</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1 class="fade-in-text">프로그래밍 동아리에 오신걸 환영합니다</h1>
            <p class="fade-in-text">대충 간단 소개</p>
            <button class="apply-btn" onclick="navTo('https://forms.gle/CGj31oDvvKqYUi6Y7')">입부 신청하기</button>
        </div>
    </section>

    <main class="feed-container">
        <div class="feed-item reveal">
            <img src="assets/images/feed1.jpg" alt="img" class="feed-img">
            <div class="feed-text">
                <h3>프로그래밍 동아리는 어떤 동아리 인가요?</h3>
                <p>내가 그걸 어떻게 알아 ㅁㅊ 준성아</p>
            </div>
        </div>

        <div class="feed-item reveal">
            <img src="assets/images/feed2.jpg" alt="img" class="feed-img">
            <div class="feed-text">
                <h3>프로그래밍 동아리에서는 무엇을 하나요?</h3>
                <p>text</p>
            </div>
        </div>

        <div class="feed-item reveal">
            <div class="feed-text">
                <h3>코딩을 모르면 불이익이 생기나요?</h3>
                <p>생길거 같은... 음</p>
                <button class="secondary-btn" onclick="navTo('https://forms.gle/CGj31oDvvKqYUi6Y7')">입부 신청하기</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
