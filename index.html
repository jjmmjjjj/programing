<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동아리 홍보 페이지</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1 class="fade-in-text">그래서 이거 언제 정해짐?</h1>
            <p class="fade-in-text">text</p>
            <button class="apply-btn" onclick="navTo('https://google.com')">link text</button>
        </div>
    </section>

    <main class="feed-container">
        <div class="feed-item reveal">
            <img src="assets/images/feed1.jpg" alt="img" class="feed-img">
            <div class="feed-text">
                <h3>text</h3>
                <p>text</p>
            </div>
        </div>

        <div class="feed-item reveal">
            <img src="assets/images/feed2.jpg" alt="img" class="feed-img">
            <div class="feed-text">
                <h3>text</h3>
                <p>text</p>
            </div>
        </div>

        <div class="feed-item reveal">
            <div class="feed-text">
                <h3>text</h3>
                <p>text</p>
                <button class="secondary-btn" onclick="navTo('https://google.com')">그래서 어쩌라고</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
